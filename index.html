<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인수형 리스 견적기</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --accent: #4f6ef7;
      --accent2: #7c3aed;
      --text: #e8eaf0;
      --muted: #8b90a8;
      --success: #22c55e;
      --error: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── 로그인 화면 ── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }
    .login-box h1 { font-size: 22px; margin-bottom: 6px; }
    .login-box p { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      letter-spacing: 2px;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .login-box button:hover { opacity: 0.88; }
    #login-error { color: var(--error); font-size: 13px; margin-top: 10px; min-height: 20px; }

    /* ── 견적기 화면 ── */
    #estimator-screen { display: none; flex: 1; flex-direction: column; }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 17px; font-weight: 700; }
    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      width: 100%;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
    }

    /* 폼 패널 */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
    }
    .panel h2 { font-size: 15px; font-weight: 700; margin-bottom: 22px; color: var(--text); }

    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field select, .field input {
      width: 100%;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .field select:focus, .field input:focus { border-color: var(--accent); }
    .field select option { background: var(--surface2); }

    .calc-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .calc-btn:hover { opacity: 0.9; }
    .calc-btn:disabled { opacity: 0.5; cursor: default; }

    /* 결과 패널 */
    .result-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 12px;
    }
    .result-placeholder svg { opacity: 0.3; }

    .result-card { display: none; }
    .result-card.visible { display: block; }

    .car-title {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .car-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    .highlight-box {
      background: linear-gradient(135deg, rgba(79,110,247,0.15), rgba(124,58,237,0.15));
      border: 1px solid rgba(79,110,247,0.3);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      text-align: center;
    }
    .highlight-box .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .highlight-box .amount {
      font-size: 36px;
      font-weight: 800;
      color: #fff;
    }
    .highlight-box .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .detail-item {
      background: var(--surface2);
      border-radius: 10px;
      padding: 16px;
    }
    .detail-item .d-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .detail-item .d-value { font-size: 16px; font-weight: 700; }

    .breakdown {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .breakdown-row {
      display: flex;
      justify-content: space-between;
      padding: 13px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .breakdown-row:last-child { border-bottom: none; }
    .breakdown-row .key { color: var(--muted); }
    .breakdown-row .val { font-weight: 600; }

    .loading { text-align: center; padding: 60px; color: var(--muted); }
    #calc-error { color: var(--error); font-size: 13px; margin-top: 10px; }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ▶ 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <h1>🔐 견적기 로그인</h1>
    <p>인수형 리스 견적 시스템</p>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" />
    <button onclick="doLogin()">입장하기</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- ▶ 견적기 화면 -->
<div id="estimator-screen">
  <header>
    <h1>📋 인수형 리스 견적기</h1>
    <button class="logout-btn" onclick="doLogout()">로그아웃</button>
  </header>

  <main>
    <!-- 입력 패널 -->
    <div class="panel">
      <h2>차량 선택 및 조건 설정</h2>

      <div class="field">
        <label>브랜드</label>
        <select id="sel-brand" onchange="onBrandChange()">
          <option value="">-- 브랜드 선택 --</option>
        </select>
      </div>
      <div class="field">
        <label>시리즈</label>
        <select id="sel-series" onchange="onSeriesChange()">
          <option value="">-- 시리즈 선택 --</option>
        </select>
      </div>
      <div class="field">
        <label>모델</label>
        <select id="sel-model" onchange="onModelChange()">
          <option value="">-- 모델 선택 --</option>
        </select>
      </div>
      <div class="field">
        <label>라인업</label>
        <select id="sel-lineup" onchange="onLineupChange()">
          <option value="">-- 라인업 선택 --</option>
        </select>
      </div>
      <div class="field">
        <label>트림</label>
        <select id="sel-trim">
          <option value="">-- 트림 선택 --</option>
        </select>
      </div>
      <div class="field">
        <label>계약 개월</label>
        <select id="sel-months">
          <option value="24">24개월</option>
          <option value="36" selected>36개월</option>
          <option value="48">48개월</option>
          <option value="60">60개월</option>
        </select>
      </div>
      <div class="field">
        <label>월 주행거리 (km)</label>
        <select id="sel-km">
          <option value="1000">1,000 km</option>
          <option value="1500" selected>1,500 km</option>
          <option value="2000">2,000 km</option>
          <option value="2500">2,500 km</option>
          <option value="3000">3,000 km</option>
        </select>
      </div>
      <div class="field">
        <label>보증금 (원)</label>
        <input type="number" id="inp-deposit" placeholder="0" step="100000" min="0" />
      </div>
      <div class="field">
        <label>잔가율 (%)</label>
        <input type="number" id="inp-residual" value="30" min="0" max="70" step="1" />
      </div>

      <button class="calc-btn" id="calc-btn" onclick="doCalculate()" disabled>
        견적 계산하기
      </button>
      <div id="calc-error"></div>
    </div>

    <!-- 결과 패널 -->
    <div class="panel" style="position:relative;">
      <div class="result-placeholder" id="result-placeholder">
        <svg width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
        <p>차량과 조건을 선택하면<br/>견적이 여기에 표시됩니다</p>
      </div>

      <div class="result-card" id="result-card">
        <div class="car-title" id="res-name"></div>
        <div class="car-sub" id="res-sub"></div>

        <div class="highlight-box">
          <div class="label">월 리스료 (부가세 포함)</div>
          <div class="amount" id="res-monthly"></div>
          <div class="sub" id="res-monthly-sub"></div>
        </div>

        <div class="detail-grid">
          <div class="detail-item">
            <div class="d-label">차량 기본가</div>
            <div class="d-value" id="res-price"></div>
          </div>
          <div class="detail-item">
            <div class="d-label">잔가 (<span id="res-rate"></span>%)</div>
            <div class="d-value" id="res-residual"></div>
          </div>
          <div class="detail-item">
            <div class="d-label">계약 기간</div>
            <div class="d-value" id="res-months"></div>
          </div>
          <div class="detail-item">
            <div class="d-label">보증금</div>
            <div class="d-value" id="res-deposit"></div>
          </div>
        </div>

        <div class="breakdown">
          <div class="breakdown-row">
            <span class="key">월 감가</span>
            <span class="val" id="res-depreciation"></span>
          </div>
          <div class="breakdown-row">
            <span class="key">월 금융비용</span>
            <span class="val" id="res-finance"></span>
          </div>
          <div class="breakdown-row">
            <span class="key">월 리스료 (VAT 별도)</span>
            <span class="val" id="res-monthly-ex"></span>
          </div>
          <div class="breakdown-row">
            <span class="key">적용 금리</span>
            <span class="val" id="res-rate-applied"></span>
          </div>
          <div class="breakdown-row">
            <span class="key">탁송료</span>
            <span class="val" id="res-delivery"></span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  // ▶ 설정: Cloudflare Worker URL (배포 후 변경)
 const WORKER_URL = "https://lease-estimator-api.sp7977.workers.dev";

  let token = sessionStorage.getItem("lease_token") || null;
  let allVehicles = [];

  // ── 초기화 ──
  window.onload = () => {
    if (token) showEstimator();
  };

  // ── 로그인 ──
  document.getElementById("pw-input").addEventListener("keydown", e => {
    if (e.key === "Enter") doLogin();
  });

  async function doLogin() {
    const pw = document.getElementById("pw-input").value;
    const errEl = document.getElementById("login-error");
    errEl.textContent = "";
    if (!pw) { errEl.textContent = "비밀번호를 입력하세요."; return; }

    try {
      const res = await fetch(`${WORKER_URL}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: pw }),
      });
      const data = await res.json();
      if (data.success) {
        token = data.token;
        sessionStorage.setItem("lease_token", token);
        showEstimator();
      } else {
        errEl.textContent = data.message || "비밀번호가 틀렸습니다.";
      }
    } catch {
      errEl.textContent = "서버 연결에 실패했습니다.";
    }
  }

  function doLogout() {
    token = null;
    sessionStorage.removeItem("lease_token");
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("estimator-screen").style.display = "none";
    document.getElementById("pw-input").value = "";
  }

  // ── 견적기 표시 ──
  async function showEstimator() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("estimator-screen").style.display = "flex";
    await loadVehicles();
  }

  // ── 차량 데이터 로드 ──
  async function loadVehicles() {
    try {
      const res = await fetch(`${WORKER_URL}/api/vehicles`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const data = await res.json();
      if (!data.success) { doLogout(); return; }
      allVehicles = data.data;
      populateBrands();
    } catch {
      alert("차량 데이터 로드 실패");
    }
  }

  // ── 드롭다운 연계 ──
  function getUnique(arr, key) {
    return [...new Map(arr.map(v => [v[key], v])).values()];
  }

  function populateBrands() {
    const sel = document.getElementById("sel-brand");
    sel.innerHTML = '<option value="">-- 브랜드 선택 --</option>';
    getUnique(allVehicles, "브랜드명").forEach(v => {
      sel.innerHTML += `<option value="${v.브랜드코드}">${v.브랜드명}</option>`;
    });
  }

  function onBrandChange() {
    const code = document.getElementById("sel-brand").value;
    const filtered = allVehicles.filter(v => v.브랜드코드 === code);
    const sel = document.getElementById("sel-series");
    sel.innerHTML = '<option value="">-- 시리즈 선택 --</option>';
    getUnique(filtered, "시리즈명").forEach(v => {
      sel.innerHTML += `<option value="${v.시리즈코드}">${v.시리즈명}</option>`;
    });
    resetFrom("sel-series");
  }

  function onSeriesChange() {
    const brand = document.getElementById("sel-brand").value;
    const series = document.getElementById("sel-series").value;
    const filtered = allVehicles.filter(v => v.브랜드코드 === brand && v.시리즈코드 === series);
    const sel = document.getElementById("sel-model");
    sel.innerHTML = '<option value="">-- 모델 선택 --</option>';
    getUnique(filtered, "모델명").forEach(v => {
      sel.innerHTML += `<option value="${v.모델코드}">${v.모델명}</option>`;
    });
    resetFrom("sel-model");
  }

  function onModelChange() {
    const brand = document.getElementById("sel-brand").value;
    const series = document.getElementById("sel-series").value;
    const model = document.getElementById("sel-model").value;
    const filtered = allVehicles.filter(v =>
      v.브랜드코드 === brand && v.시리즈코드 === series && v.모델코드 === model
    );
    const sel = document.getElementById("sel-lineup");
    sel.innerHTML = '<option value="">-- 라인업 선택 --</option>';
    getUnique(filtered, "라인업명").forEach(v => {
      sel.innerHTML += `<option value="${v.라인업코드}">${v.라인업명}</option>`;
    });
    resetFrom("sel-lineup");
  }

  function onLineupChange() {
    const brand = document.getElementById("sel-brand").value;
    const series = document.getElementById("sel-series").value;
    const model = document.getElementById("sel-model").value;
    const lineup = document.getElementById("sel-lineup").value;
    const filtered = allVehicles.filter(v =>
      v.브랜드코드 === brand && v.시리즈코드 === series &&
      v.모델코드 === model && v.라인업코드 === lineup
    );
    const sel = document.getElementById("sel-trim");
    sel.innerHTML = '<option value="">-- 트림 선택 --</option>';
    filtered.forEach(v => {
      const label = `${v.트림명} (${v.년형}년형) - ${won(v.기본가격)}`;
      sel.innerHTML += `<option value="${v.트림코드}">${label}</option>`;
    });
    document.getElementById("calc-btn").disabled = true;
    sel.onchange = () => {
      document.getElementById("calc-btn").disabled = !sel.value;
    };
  }

  function resetFrom(fromId) {
    const order = ["sel-series", "sel-model", "sel-lineup", "sel-trim"];
    const idx = order.indexOf(fromId);
    for (let i = idx + 1; i < order.length; i++) {
      document.getElementById(order[i]).innerHTML =
        `<option value="">-- 선택 --</option>`;
    }
    document.getElementById("calc-btn").disabled = true;
  }

  // ── 견적 계산 ──
  async function doCalculate() {
    const trimCode = document.getElementById("sel-trim").value;
    const contractMonths = parseInt(document.getElementById("sel-months").value);
    const monthlyKm = parseInt(document.getElementById("sel-km").value);
    const deposit = parseInt(document.getElementById("inp-deposit").value || "0");
    const residualRate = parseFloat(document.getElementById("inp-residual").value || "30");

    if (!trimCode) return;

    document.getElementById("calc-btn").disabled = true;
    document.getElementById("calc-btn").textContent = "계산 중...";
    document.getElementById("calc-error").textContent = "";

    try {
      const res = await fetch(`${WORKER_URL}/api/estimate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, trimCode, contractMonths, monthlyKm, deposit, residualRate }),
      });
      const data = await res.json();
      if (data.success) {
        showResult(data.estimate);
      } else {
        document.getElementById("calc-error").textContent = data.message;
      }
    } catch {
      document.getElementById("calc-error").textContent = "서버 오류가 발생했습니다.";
    } finally {
      document.getElementById("calc-btn").disabled = false;
      document.getElementById("calc-btn").textContent = "견적 계산하기";
    }
  }

  function showResult(e) {
    document.getElementById("result-placeholder").style.display = "none";
    const card = document.getElementById("result-card");
    card.classList.add("visible");

    document.getElementById("res-name").textContent = e.차량명;
    document.getElementById("res-sub").textContent = `${e.브랜드} · ${e.계약개월}개월 · 월 ${e.월주행거리.toLocaleString()}km`;
    document.getElementById("res-monthly").textContent = won(e.월리스료_부가세포함);
    document.getElementById("res-monthly-sub").textContent = `부가세 별도 ${won(e.월리스료_부가세별도)}`;
    document.getElementById("res-price").textContent = won(e.기본가격);
    document.getElementById("res-rate").textContent = e.잔가율;
    document.getElementById("res-residual").textContent = won(e.잔가);
    document.getElementById("res-months").textContent = `${e.계약개월}개월`;
    document.getElementById("res-deposit").textContent = won(e.보증금);
    document.getElementById("res-depreciation").textContent = won(e.월감가);
    document.getElementById("res-finance").textContent = won(e.월금융비용);
    document.getElementById("res-monthly-ex").textContent = won(e.월리스료_부가세별도);
    document.getElementById("res-rate-applied").textContent = e.적용금리;
    document.getElementById("res-delivery").textContent = won(e.탁송료);
  }

  function won(n) {
    return Math.round(n).toLocaleString("ko-KR") + "원";
  }
</script>
</body>
</html>
